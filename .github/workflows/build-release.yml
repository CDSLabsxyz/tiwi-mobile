name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for this version'
        required: false
        default: 'Bug fixes and improvements'
      force_update:
        description: 'Force users to update (true/false)'
        required: false
        default: 'false'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Get app version from app.json
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./app.json').expo.version)")
          BUILD_NUMBER=$(date +%s)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-${BUILD_NUMBER}" >> $GITHUB_OUTPUT

      - name: Build Android APK on EAS
        run: |
          # Start the build on EAS servers and wait for it to finish
          eas build --platform android --profile preview --non-interactive --json > build-result.json 2>&1 || true

          # Extract the build URL from EAS output
          BUILD_URL=$(cat build-result.json | node -e "
            const fs = require('fs');
            const data = fs.readFileSync('/dev/stdin', 'utf8');
            try {
              const builds = JSON.parse(data);
              const build = Array.isArray(builds) ? builds[0] : builds;
              console.log(build.artifacts?.buildUrl || build.artifacts?.url || '');
            } catch(e) {
              // Try to find URL in raw output
              const match = data.match(/https:\/\/expo\.dev\/artifacts\/[^\s\"]+/);
              console.log(match ? match[0] : '');
            }
          ")

          if [ -z "$BUILD_URL" ]; then
            echo "ERROR: Could not get build artifact URL"
            cat build-result.json
            exit 1
          fi

          echo "Build URL: $BUILD_URL"
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT
        id: build

      - name: Download APK from EAS
        run: |
          curl -L -o ./tiwi-${{ steps.version.outputs.version }}.apk "${{ steps.build.outputs.build_url }}"
          ls -lh ./tiwi-${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TIWI Protocol ${{ steps.version.outputs.version }}
          body: ${{ github.event.inputs.release_notes || 'Bug fixes and improvements' }}
          files: ./tiwi-${{ steps.version.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get APK download URL
        id: apk_url
        run: |
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/tiwi-${{ steps.version.outputs.version }}.apk"
          echo "url=$APK_URL" >> $GITHUB_OUTPUT

      - name: Update Supabase app_versions table
        run: |
          curl -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/app_versions" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{
              "version": "${{ steps.version.outputs.version }}",
              "build_number": ${{ steps.version.outputs.build_number }},
              "apk_url": "${{ steps.apk_url.outputs.url }}",
              "release_notes": "${{ github.event.inputs.release_notes || 'Bug fixes and improvements' }}",
              "force_update": ${{ github.event.inputs.force_update || 'false' }}
            }'

      - name: Send update notification to all users
        run: |
          # Fetch all active push tokens from Supabase
          TOKENS_JSON=$(curl -s "${{ secrets.SUPABASE_URL }}/rest/v1/user_push_tokens?is_active=eq.true&select=push_token" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}")

          # Build the Expo push messages array and send in batches of 100
          node -e "
            const tokens = JSON.parse(process.argv[1] || '[]');
            if (!tokens.length) { console.log('No push tokens found, skipping.'); process.exit(0); }

            const messages = tokens.map(t => ({
              to: t.push_token,
              sound: 'default',
              title: 'Update Available',
              body: 'TIWI Protocol v${{ steps.version.outputs.version }} is ready. Open the app to update.',
              data: { type: 'app_update', version: '${{ steps.version.outputs.version }}' },
            }));

            // Expo push API accepts max 100 per request
            const chunks = [];
            for (let i = 0; i < messages.length; i += 100) {
              chunks.push(messages.slice(i, i + 100));
            }

            (async () => {
              for (const chunk of chunks) {
                const res = await fetch('https://exp.host/--/api/v2/push/send', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(chunk),
                });
                const result = await res.json();
                console.log('Sent', chunk.length, 'notifications:', result.data?.length || 0, 'accepted');
              }
            })();
          " "\$TOKENS_JSON"
